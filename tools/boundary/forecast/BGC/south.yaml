# ----------------------------------
# YEAR / ENSEMBLE
# ----------------------------------
year: 2012
month: "01"
ensemble: "01"

# ----------------------------------
# INPUT DATA
# ----------------------------------

# Option 1: Let script construct path from fct_dir
fct_dir: /archive/Dmitry.Dukhovskoy/fre/NEP/forecast_bgc/NEPbgc_fcst_dailyOB01

# Option 2 (uncomment to force exact file)
# input_file: /archive/Dmitry.Dukhovskoy/fre/NEP/forecast_bgc/NEPbgc_fcst_dailyOB01/2012-01-e01/history/ocean_cobalt_tracers_month_z.nc

# Use first 12 months only
